# group is created by the vm-agent role (leihs-inventory) — deploy that
# role first on hosts that enable prom_textfile_dir
- name: add app user to prom-textfile group (textfile-collector write access)
  user:
    name: '{{app_user}}'
    groups: prom-textfile
    append: yes
  when: prom_textfile_dir | default('') | length > 0

- name: copy {{app_name}}.service
  template:
    src: 'sync.service'
    dest: /etc/systemd/system/{{app_name}}.service
    mode: 0644

- name: enable {{app_name}}.service
  service:
    name: '{{app_name}}.service'
    daemon_reload: yes
    enabled: yes

- name: install {{app_name}} timer
  template:
    src: sync.timer
    dest: /etc/systemd/system/{{app_name}}.timer
    mode: 0644

- name: enable and start the timer
  service:
    name: '{{app_name}}.timer'
    enabled: yes
    state: started

- name: run the sync service now
  service:
    name: '{{app_name}}.service'
    state: started
  async: 3600
  poll: 10
